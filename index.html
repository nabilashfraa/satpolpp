<!-- Social Share Interaktif dengan Menu Titik Tiga (Mobile-Friendly) -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant flex flex-row items-center justify-between gap-4 relative">
    <span class="font-bold text-primary">Bagikan Berita:</span>
    
    <!-- Pemicu Dropdown Menu Menggunakan Alpine.js -->
    <div class="relative" x-data="{ shareOpen: false }" @click.away="shareOpen = false">
        <!-- Tombol Titik Tiga -->
        <button @click="shareOpen = !shareOpen" class="flex items-center justify-center p-2 bg-surface-container-highest hover:bg-outline-variant rounded-full transition-colors focus:outline-none" aria-label="Pilihan bagikan">
            <span class="material-symbols-outlined text-secondary font-bold">more_vert</span>
        </button>

        <!-- Daftar Fitur & Sub-fitur Share (Muncul saat titik tiga diklik) -->
        <div x-show="shareOpen" 
             x-transition:enter="transition ease-out duration-100"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-75"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="absolute right-0 bottom-full mb-2 w-48 bg-white border border-outline-variant rounded-xl shadow-xl py-2 z-40"
             style="display: none;">
            
            <!-- Link Aksi Langsung (Menggunakan target="_blank" agar membuka aplikasi/tab baru) -->
            <a href="https://www.facebook.com/sharer/sharer.php?u=window.location.href" 
               target="_blank" 
               class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-surface-container-low hover:text-[#1877F2] transition-colors">
                <span class="material-symbols-outlined text-base">share</span>
                <span>Facebook</span>
            </a>
            
            <a href="https://twitter.com/intent/tweet?url=window.location.href" 
               target="_blank" 
               class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-surface-container-low hover:text-[#1DA1F2] transition-colors">
                <span class="material-symbols-outlined text-base">share</span>
                <span>X / Twitter</span>
            </a>
            
            <a href="https://api.whatsapp.com/send?text=window.location.href" 
               target="_blank" 
               class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-surface-container-low hover:text-[#25D366] transition-colors">
                <span class="material-symbols-outlined text-base">chat</span>
                <span>WhatsApp</span>
            </a>

            <hr class="border-outline-variant my-1">

            <button @click="navigator.clipboard.writeText(window.location.href); alert('Tautan berhasil disalin!'); shareOpen = false" 
                    class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-surface-container-low hover:text-primary transition-colors text-left">
                <span class="material-symbols-outlined text-base">link</span>
                <span>Salin Tautan</span>
            </button>
        </div>
    </div>
</div>
