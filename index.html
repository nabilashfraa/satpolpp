<!-- Bagian Share Berita Interaktif -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant flex flex-row items-center justify-between gap-4 relative">
    <span class="font-bold text-primary">Bagikan Berita:</span>
    
    <!-- Kontainer Dropdown -->
    <div class="relative">
        <!-- Tombol Titik Tiga Asli Anda -->
        <button id="btnTitikTiga" class="flex items-center justify-center p-2.5 bg-surface-container-low hover:bg-surface-container-highest rounded-full border border-outline-variant transition-colors focus:outline-none">
            <span class="material-symbols-outlined text-secondary font-bold">more_vert</span>
        </button>

        <!-- Menu Fitur & Sub-fitur (Otomatis ikut ter-swipe up) -->
        <div id="menuShareMobile" class="absolute right-0 bottom-full mb-3 w-48 bg-white border border-outline-variant rounded-xl shadow-xl py-2 z-50 hidden">
            <button onclick="eksekusiShare('facebook')" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-slate-100 hover:text-[#1877F2] transition-colors text-left">
                <span class="material-symbols-outlined text-base">share</span>
                <span>Facebook</span>
            </button>
            
            <button onclick="eksekusiShare('twitter')" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-slate-100 hover:text-slate-900 transition-colors text-left">
                <span class="material-symbols-outlined text-base">share</span>
                <span>X / Twitter</span>
            </button>
            
            <button onclick="eksekusiShare('whatsapp')" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-slate-100 hover:text-[#25D366] transition-colors text-left">
                <span class="material-symbols-outlined text-base">chat</span>
                <span>WhatsApp</span>
            </button>

            <hr class="border-outline-variant my-1">

            <button onclick="salinTautanBerita()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-slate-100 hover:text-primary transition-colors text-left">
                <span class="material-symbols-outlined text-base">link</span>
                <span>Salin Tautan</span>
            </button>
        </div>
    </div>
</div>
